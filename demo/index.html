<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orikata Demo</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: white;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main { width: 420px; }
      #target {
        width: 420px;
        height: 220px;
      }
      .card-source {
        position: relative;
        width: 420px;
        height: 220px;
        padding: 32px;
        box-sizing: border-box;
      }
      .card-source button {
        position: absolute;
        left: 270px;
        top: 132px;
        width: 100px;
        height: 36px;
        border: 0;
        border-radius: 999px;
      }
      #toggle { margin-top: 24px; padding: 10px 14px; border: 0; border-radius: 999px; }
      .ori-source-layer {
        opacity: 0;
        pointer-events: auto;
        z-index: 0;
      }
      .ori-visual-layer { z-index: 1; }
      .ori-interaction-layer {
        pointer-events: auto;
        background: transparent;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <main>
      <section id="target">
        <div class="card-source">
          <h1>Orikata</h1>
          <p>Initial runtime: static-view, interactive-bridge, and baked-view.</p>
          <button>Source button</button>
        </div>
      </section>
      <button id="toggle">Toggle fold angle</button>
    </main>
    <script type="module" src="/demo/main.ts"></script>
  </body>
</html>
