<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fold3D Demo</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: white;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        width: min(420px, 80vw);
        padding: 48px;
        border-radius: 28px;
        background: linear-gradient(135deg, #60a5fa, #a78bfa 55%, #f472b6);
        box-shadow: 0 32px 90px rgba(0, 0, 0, 0.45);
        transform: perspective(var(--fold3d-perspective, 900px)) rotateY(var(--fold3d-angle, 0deg));
        transform-style: preserve-3d;
        transition: transform 180ms ease;
      }
      button { margin-top: 24px; padding: 10px 14px; border: 0; border-radius: 999px; }
    </style>
  </head>
  <body>
    <main>
      <section class="card" id="target">
        <h1>Fold3D</h1>
        <p>Scaffold ready. Real segment renderer goes into src/index.ts after the design is provided.</p>
      </section>
      <button id="toggle">Toggle angle</button>
    </main>
    <script type="module" src="/demo/main.ts"></script>
  </body>
</html>
